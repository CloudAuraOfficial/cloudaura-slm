services:
  # Ollama: uses shared instance via ollama-net (see ~/ollama-infra/)
  app:
    build: .
    container_name: cloudaura-slm-app
    mem_limit: 512m
    ports:
      - "127.0.0.1:8002:8002"
    env_file: .env
    networks:
      - ollama-net
    volumes:
      - benchmark_results:/app/benchmark_results
    restart: unless-stopped

volumes:
  benchmark_results:

networks:
  ollama-net:
    external: true
