services:
  ollama:
    image: ollama/ollama:latest
    container_name: cloudaura-slm-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  app:
    build: .
    container_name: cloudaura-slm-app
    ports:
      - "127.0.0.1:8002:8002"
    env_file: .env
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - benchmark_results:/app/benchmark_results
    restart: unless-stopped

volumes:
  ollama_data:
  benchmark_results:
